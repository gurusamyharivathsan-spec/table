<table class=" border-black border-4">
    <thead>
      <th class="border">User</th>
      <th class="border">Email</th>
      <th class="border">Phone </th>
    </thead>
    <tbody class="">
      @for (item of user; track item) {
        <tr >
          <td class="p-2 border border-red-700">{{item.name}}</td>
          <td class="p-2 border border-red-700">{{item.email}}</td>
          <td class="p-2 border border-red-700">{{item.phone}}</td>
        </tr>
      }
    </tbody>
</table>
